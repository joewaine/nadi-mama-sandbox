services:
  - type: web
    runtime: static
    name: nadi-mama-sandbox
    buildCommand: npm ci && npm run generate
    staticPublishPath: .output/public
    pullRequestPreviewsEnabled: true
    headers:
      - path: /_nuxt/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /favicon.svg
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
